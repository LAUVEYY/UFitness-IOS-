name: UFitness iOS Unsigned Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unsigned IPA for Sideloadly
    runs-on: macos-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🛠️ Install xcbeautify
        run: brew install xcbeautify

      - name: 📦 Install NPM Dependencies
        run: npm install

      - name: 🏗️ Generate Native iOS Project
        run: npx expo prebuild --platform ios --clean

      - name: 🔗 Install CocoaPods (Forced Update)
        run: |
          cd ios
          pod install --repo-update

      - name: 🔨 Compile App (Using Default DerivedData)
        # Removing the directory overrides fixes the RCTSwiftUI module map crash
        run: |
          set -o pipefail
          xcodebuild clean build \
            -workspace ios/UFitness.xcworkspace \
            -scheme UFitness \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO | xcbeautify

      - name: 📦 Package into IPA for Sideloadly
        run: |
          mkdir -p Payload
          # Dynamically locate the built .app file in Xcode's default system folder
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "UFitness.app" -type d | head -n 1)
          echo "Found compiled app at: $APP_PATH"
          mv "$APP_PATH" Payload/
          zip -r UFitness.ipa Payload

      - name: 📤 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UFitness-Unsigned-IPA
          path: UFitness.ipa
          retention-days: 7
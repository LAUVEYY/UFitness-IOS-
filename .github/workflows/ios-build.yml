name: UFitness iOS Unsigned Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unsigned IPA for Sideloadly
    runs-on: macos-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install NPM Dependencies
        run: npm install

      - name: 🏗️ Generate Native iOS Project (Liquid Glass Linking)
        run: npx expo prebuild --platform ios --clean

      - name: 🔗 Install CocoaPods
        run: |
          cd ios
          pod install

      - name: 🔨 Compile App (No Code Signing)
        run: |
          xcodebuild clean build \
            -workspace ios/UFitness.xcworkspace \
            -scheme UFitness \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: 📦 Package into IPA for Sideloadly
        run: |
          mkdir -p Payload
          mv ./build/Build/Products/Release-iphoneos/UFitness.app Payload/
          zip -r UFitness.ipa Payload

      - name: 📤 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UFitness-Unsigned-IPA
          path: UFitness.ipa
          retention-days: 7